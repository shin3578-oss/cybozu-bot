# ==========================================================
# 【何をする】サイボウズの日報・週報をAI添削して自動承認（＋勤怠・給与・CSV突合の月次起動役）
# 【いつ動く】30分ごと｜Cron-job.org「サイボウズBot」ジョブが起動
# ==========================================================
name: サイボウズ 日報・設備使用許可書 自動承認

on:
  workflow_dispatch:  # Cron-job.org から呼び出す（30分ごと）

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 30分ごとに毎日動くこのワークフローを「時計」として使い、
      # 月次ボットを所定の日時に起動する（Cron-job.org 無料枠12件の節約のため）。
      # 起動は毎時00分の回のみ。起動失敗時はこのステップが失敗して通知される。
      - name: 月次ボット起動判定（勤怠・給与・歩合突合）
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          DAY=$(TZ=Asia/Tokyo date +%d)
          HOUR=$(TZ=Asia/Tokyo date +%H)
          MIN=$(TZ=Asia/Tokyo date +%M)
          echo "JST: ${DAY}日 ${HOUR}:${MIN}"
          if [ $((10#$MIN)) -ge 30 ]; then
            echo "毎時30分の回のためスキップ"
            exit 0
          fi
          dispatch() {
            curl -sf -X POST \
              -H "Authorization: token $DISPATCH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/shin3578-oss/$1/actions/workflows/$2/dispatches" \
              -d '{"ref":"main"}' \
              && echo "→ $1 起動OK" \
              || { echo "→ $1 起動失敗"; exit 1; }
          }
          # 勤怠自動集計: 毎月5日 21:00 JST
          if [ "$DAY" = "05" ] && [ "$HOUR" = "21" ]; then
            dispatch kintai-automation kintai_auto.yml
          fi
          # コンサル歩合突合（前月分）: 毎月1日 9:00 JST
          if [ "$DAY" = "01" ] && [ "$HOUR" = "09" ]; then
            dispatch apotool-automation csv_matching.yml
          fi
          # 給与振込チェック: 毎月10〜14日 9:00 / 13:00 / 18:00 JST
          case "$DAY" in
            10|11|12|13|14)
              if [ "$HOUR" = "09" ] || [ "$HOUR" = "13" ] || [ "$HOUR" = "18" ]; then
                dispatch payroll-check-bot payroll_check.yml
              fi
              ;;
          esac

      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright ブラウザをインストール
        run: playwright install chromium --with-deps

      - name: ボットを実行
        env:
          CYBOZU_URL: ${{ secrets.CYBOZU_URL }}
          CYBOZU_LOGIN_ID: ${{ secrets.CYBOZU_LOGIN_ID }}
          CYBOZU_PASSWORD: ${{ secrets.CYBOZU_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py
