name: サイボウズ 日報・設備使用許可書 自動承認

on:
  schedule:
    - cron: '*/30 * * * *'  # 30分ごとに実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright ブラウザをインストール
        run: playwright install chromium --with-deps

      - name: ボットを実行
        env:
          CYBOZU_URL: ${{ secrets.CYBOZU_URL }}
          CYBOZU_LOGIN_ID: ${{ secrets.CYBOZU_LOGIN_ID }}
          CYBOZU_PASSWORD: ${{ secrets.CYBOZU_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py
